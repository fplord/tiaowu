<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Beat Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- tap to start overlay -->
  <!-- lobby -->
  <div id="lobby">
    <div id="my-emoji"></div>
    <div id="player-list"></div>
    <button id="ready-btn">READY</button>
    <div id="lobby-countdown"></div>
  </div>

  <!-- scoreboard (visible during game) -->
  <div id="scoreboard"></div>

  <!-- game -->
  <div id="top">
    <div id="score">score <b id="score-val">0</b></div>
    <div id="countdown"></div>
    <div id="duration"></div>
  </div>

  <canvas id="dancefloor"></canvas>

  <div id="middle">
    <div id="rating"></div>
    <canvas id="lane"></canvas>
    <div id="level"></div>
    <div id="sequence"></div>
  </div>

  <div id="bottom">
    <div id="controls" style="display:none">
      <button id="export">export</button>
      <button id="btn">▶</button>
    </div>
  </div>

  <audio id="audio" src="KeyKey - 当想你成为习惯(DJR7版)「当想你成为习惯一个人说着晚安」(Lyrics) ｜ Best TikTok - Douyin Songs [sFf1y-WnBkw].webm"></audio>

  <script>
    // ── websocket ──
    const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`);
    const emit = (type, payload = {}) => ws.send(JSON.stringify({ type, ...payload }));
    let myEmoji = null;
    let isReady = false;

    let lastBoard = [];
    let playerOrder = []; // stable join order for dancefloor positions
    const shownLabels = {};
    const labelTimers = {};
    const sb = document.getElementById('scoreboard');
    const dfCanvas = document.getElementById('dancefloor');
    const dfc = dfCanvas.getContext('2d');

    function resizeDancefloor() {
      const size = Math.min(window.innerWidth, 1024);
      dfCanvas.width = size;
      dfCanvas.height = size;
    }
    resizeDancefloor();
    window.addEventListener('resize', () => { resizeDancefloor(); drawDancefloor(); });

    const LABEL_COLORS = { perfect: '#c084fc', great: '#77ddff', good: '#aad888', bad: '#ff7766', miss: '#ff4444' };

    const emojiAnims = {}; // emoji -> { startTime, particles }
    let animLoopRunning = false;

    function triggerPerfect(emoji, x, cy) {
      const N = 12;
      emojiAnims[emoji] = {
        startTime: performance.now(),
        particles: Array.from({ length: N }, (_, i) => ({
          angle: (i / N) * Math.PI * 2 + Math.random() * 0.3,
          speed: 110 + Math.random() * 110,
          r: 6 + Math.random() * 4,
          color: ['#c084fc', '#e0b0ff', '#ffffff', '#f0c0ff'][Math.floor(Math.random() * 4)],
        })),
        x, cy,
      };
      if (!animLoopRunning) {
        animLoopRunning = true;
        requestAnimationFrame(animLoop);
      }
    }

    function animLoop() {
      const now = performance.now();
      const active = Object.keys(emojiAnims);
      if (!active.length) { animLoopRunning = false; return; }
      drawDancefloor();
      requestAnimationFrame(animLoop);
    }

    function drawDancefloor() {
      dfc.clearRect(0, 0, dfCanvas.width, dfCanvas.height);
      if (!playerOrder.length) return;
      const step = dfCanvas.width / playerOrder.length;
      const cy = dfCanvas.height / 2;
      dfc.textAlign = 'center';
      const boardMap = Object.fromEntries(lastBoard.map(p => [p.emoji, p]));

      playerOrder.forEach((emoji, i) => {
        const p = boardMap[emoji] || { emoji };
        const x = step * i + step / 2;
        const lbl = shownLabels[p.emoji] || '';
        const anim = emojiAnims[emoji];

        // glow ring + particles
        if (anim) {
          const t = Math.min((performance.now() - anim.startTime) / 700, 1);
          if (t >= 1) {
            delete emojiAnims[emoji];
          } else {
            // expanding glow ring
            dfc.save();
            const ringR = 68 + t * 88;
            const ringAlpha = (1 - t) * 0.9;
            dfc.beginPath();
            dfc.arc(x, cy, ringR, 0, Math.PI * 2);
            dfc.strokeStyle = `rgba(192,132,252,${ringAlpha})`;
            dfc.lineWidth = 4 * (1 - t) + 1;
            dfc.shadowBlur = 20;
            dfc.shadowColor = '#c084fc';
            dfc.stroke();
            dfc.restore();

            // particles
            anim.particles.forEach(p => {
              const dist = t * p.speed;
              const px = x + Math.cos(p.angle) * dist;
              const py = cy + Math.sin(p.angle) * dist;
              const alpha = 1 - t;
              dfc.save();
              dfc.globalAlpha = alpha;
              dfc.beginPath();
              dfc.arc(px, py, p.r * (1 - t * 0.4), 0, Math.PI * 2);
              dfc.fillStyle = p.color;
              dfc.shadowBlur = 8;
              dfc.shadowColor = p.color;
              dfc.fill();
              dfc.restore();
            });
          }
        }

        // emoji (with beat pulse)
        const beatT = audio.paused ? 0 : audio.currentTime;
        let pulse = 0;
        if (!audio.paused && allBeats.length) {
          const lastBeat = allBeats.filter(b => b <= beatT).at(-1);
          if (lastBeat !== undefined) {
            const elapsed = beatT - lastBeat;
            if (elapsed < 0.25) pulse = (1 - elapsed / 0.20) * 0.12;
          }
        }
        const scale = 1 + pulse;
        dfc.save();
        dfc.translate(x, cy);
        dfc.scale(scale, scale);
        dfc.font = '128px serif';
        dfc.textBaseline = 'middle';
        dfc.textAlign = 'center';
        dfc.shadowColor = 'rgba(0,0,0,0.5)';
        dfc.shadowBlur = 16;
        dfc.shadowOffsetY = 6;
        dfc.fillText(p.emoji, 0, 0);
        dfc.restore();

        // label
        if (lbl) {
          const cls = lbl.split(' ')[0].toLowerCase();
          dfc.save();
          dfc.font = 'bold 36px monospace';
          dfc.textBaseline = 'top';
          dfc.fillStyle = LABEL_COLORS[cls] || '#fff';
          dfc.shadowColor = 'rgba(0,0,0,0.6)';
          dfc.shadowBlur = 6;
          dfc.fillText(lbl, x, 2);
          dfc.restore();
        }
      });
    }

    function renderBoard() {
      sb.innerHTML = lastBoard.map(p => {
        return `
          <div class="sb-row ${p.emoji === myEmoji ? 'me' : ''}">
            <span>${p.emoji}</span>
            <span class="sb-score">${p.score}</span>
          </div>`;
      }).join('');

      drawDancefloor();
    }

    ws.onmessage = ({ data }) => {
      const msg = JSON.parse(data);

      if (msg.type === 'assigned') {
        myEmoji = msg.emoji;
        document.getElementById('my-emoji').textContent = msg.emoji;
        if (msg.gameState === 'playing') {
          document.getElementById('ready-btn').textContent = 'waiting...';
          document.getElementById('ready-btn').disabled = true;
        }
      }

      if (msg.type === 'players') {
        playerOrder = msg.players.map(p => p.emoji);
        const list = document.getElementById('player-list');
        list.innerHTML = msg.players.map(p => `
          <div class="player-row">
            <span>${p.emoji}</span>
            <span class="status ${p.ready ? 'ready' : ''}">${p.ready ? 'ready' : 'waiting'}</span>
          </div>
        `).join('');
      }

      if (msg.type === 'countdown') {
        countdown.textContent = msg.n;
        document.getElementById('lobby-countdown').textContent = msg.n;
      }

      if (msg.type === 'start') {
        document.getElementById('lobby').classList.add('hidden');
        ctx.resume();
        audio.play();
        btn.textContent = '⏸';
        tick();
      }

      if (msg.type === 'scoreboard') {
        lastBoard = msg.board;
        if (msg.label && msg.emoji) {
          shownLabels[msg.emoji] = msg.label;
          clearTimeout(labelTimers[msg.emoji]);
          labelTimers[msg.emoji] = setTimeout(() => { delete shownLabels[msg.emoji]; renderBoard(); }, 1200);
          if (msg.label.startsWith('PERFECT')) {
            const idx = playerOrder.indexOf(msg.emoji);
            if (idx !== -1) {
              const step = dfCanvas.width / playerOrder.length;
              triggerPerfect(msg.emoji, step * idx + step / 2, dfCanvas.height / 2);
            }
          }
        }
        renderBoard();
      }
    };

    const readyBtn = document.getElementById('ready-btn');

    // ── audio / game ──
    const audio = document.getElementById('audio');
    const btn = document.getElementById('btn');
    const countdown = document.getElementById('countdown');
    const rating = document.getElementById('rating');
    const scoreEl = document.getElementById('score-val');

    let matchedTaps = [];
    let lastTapIdx = -1;
    let ratingTimer = null;
    let perfectStreak = 0;
    let score = 0;
    const scoredTaps = new Set();
    const taps = [];

    const POINTS = { perfect: 100, great: 60, good: 30, bad: 10, miss: 0 };

    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    audio.volume = 0.3;

    readyBtn.addEventListener('click', () => {
      isReady = !isReady;
      emit('ready', { value: isReady });
      readyBtn.textContent = isReady ? 'CANCEL' : 'READY';
      readyBtn.classList.toggle('is-ready', isReady);
      // Unlock audio during user gesture so audio.play() works later from WS handler
      ctx.resume();
      audio.play().then(() => audio.pause()).catch(() => {});
    });

    function playTap() {
      const now = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(120, now);
      o.frequency.exponentialRampToValueAtTime(40, now + 0.3);
      g.gain.setValueAtTime(4.0, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      o.start(now); o.stop(now + 0.3);

      const bufLen = Math.floor(ctx.sampleRate * 0.04);
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
      const noise = ctx.createBufferSource();
      noise.buffer = buf;
      const ng = ctx.createGain();
      noise.connect(ng); ng.connect(ctx.destination);
      ng.gain.setValueAtTime(3, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
      noise.start(now);
    }

    function playPerfect() {
      const u = new SpeechSynthesisUtterance('Perfect!');
      u.pitch = 1.3;
      u.rate = 1.1;
      u.volume = 1;
      speechSynthesis.speak(u);
    }

    fetch('beatsmatched.json')
      .then(r => r.json())
      .then(data => { matchedTaps = data; });

    let allBeats = [];
    fetch('beats.json')
      .then(r => r.json())
      .then(data => { allBeats = data.beat_times; });

    let inputBuffer = '';
    const KEY_MAP = { ArrowUp: 'U', ArrowDown: 'D', ArrowLeft: 'L', ArrowRight: 'R' };
    const seqEl = document.getElementById('sequence');

    function renderSequence() {
      const t = audio.paused ? 0 : audio.currentTime;
      const nextTap = matchedTaps.find((m, i) => m.beat > t && !scoredTaps.has(i));
      if (!nextTap) { seqEl.innerHTML = ''; document.getElementById('level').textContent = ''; return; }
      document.getElementById('level').textContent = `LEVEL ${nextTap.sequence.length}`;
      seqEl.innerHTML = nextTap.sequence.split('').map((c, i) => {
        const matched = i < inputBuffer.length;
        return `<span style="${matched ? 'border-color:#4ade80;color:#4ade80' : ''}">${ARROWS[c]}</span>`;
      }).join('');
    }

    document.addEventListener('keydown', e => {
      const dir = KEY_MAP[e.key];
      if (dir) {
        e.preventDefault();
        if (audio.paused || !matchedTaps.length) return;
        const t = audio.currentTime;
        const nextTap = matchedTaps.find((m, i) => m.beat > t && !scoredTaps.has(i));
        if (!nextTap) return;
        if (inputBuffer === nextTap.sequence) return;
        const newBuffer = inputBuffer + dir;
        if (nextTap.sequence.startsWith(newBuffer)) {
          inputBuffer = newBuffer;
        } else {
          inputBuffer = '';
        }
        renderSequence();
        return;
      }
    });

    function doTap() {
      navigator.vibrate?.(30);
      playTap();
      if (audio.paused || !matchedTaps.length) return;

      const t = audio.currentTime;
      taps.push(t);
      const closestIdx = matchedTaps.reduce((bi, m, i) => Math.abs(m.beat - t) < Math.abs(matchedTaps[bi].beat - t) ? i : bi, 0);
      const target = matchedTaps[closestIdx];

      // require full buffer match before scoring
      if (inputBuffer !== target.sequence) return;

      const signedDiff = (t - target.beat) * 1000;
      const diff = Math.abs(signedDiff);

      if (diff >= 500) return;
      if (scoredTaps.has(closestIdx)) return;
      scoredTaps.add(closestIdx);
      inputBuffer = '';

      let label, cls;
      if (diff < 80) {
        perfectStreak++;
        playPerfect();
        label = perfectStreak > 1 ? `PERFECT x${perfectStreak}` : 'PERFECT';
        cls = 'perfect';
        score += POINTS.perfect + (perfectStreak * 20);
      } else {
        perfectStreak = 0;
        if      (diff < 100) { label = 'GREAT'; cls = 'great'; score += POINTS.great; }
        else if (diff < 180) { label = 'GOOD';  cls = 'good';  score += POINTS.good;  }
        else                 { label = 'BAD';   cls = 'bad';   }
      }
      scoreEl.textContent = score;
      emit('score', { total: score, label });

      const timing = signedDiff >= 0 ? 'late' : 'early';
      rating.textContent = `${label}  ${Math.abs(signedDiff).toFixed(0)}ms ${timing}`;
      rating.className = 'show ' + cls;
      hitFlash = { color: HIT_COLORS[cls], until: performance.now() + 400 };
      clearTimeout(ratingTimer);
      ratingTimer = setTimeout(() => rating.classList.remove('show'), 600);
    }

    document.addEventListener('touchstart', e => { e.preventDefault(); doTap(); }, { passive: false });
    document.addEventListener('click', doTap);
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); doTap(); }
    });

    document.getElementById('export').addEventListener('click', () => {
      navigator.clipboard.writeText(JSON.stringify(taps, null, 2));
    });

    btn.addEventListener('click', () => {
      if (audio.paused) {
        ctx.resume();
        audio.play();
        btn.textContent = '⏸';
        tick();
      } else {
        audio.pause();
        btn.textContent = '▶';
      }
    });


    // ── lane visualisation ──
    const laneEl = document.getElementById('lane');
    const lc = laneEl.getContext('2d');
    const LOOKAHEAD = 15;
    const HIT_COLORS = { perfect: '#c084fc', great: '#22aadd', good: '#66bb44', bad: '#ff7766', miss: '#ccc' };
    const ARROWS = { U: '↑', D: '↓', L: '←', R: '→' };
    let hitFlash = null;

    function resizeLane() {
      laneEl.width = Math.min(window.innerWidth, 1024);
      laneEl.height = 90;
    }
    resizeLane();
    window.addEventListener('resize', resizeLane);

    function drawLane(t) {
      const W = laneEl.width, H = laneEl.height;
      const HIT_X = 72;
      const pps = (W - HIT_X) / LOOKAHEAD;

      lc.clearRect(0, 0, W, H);

      // hit line
      const flashActive = hitFlash && performance.now() < hitFlash.until;
      lc.save();
      lc.strokeStyle = flashActive ? hitFlash.color : 'rgba(255,255,255,0.4)';
      lc.lineWidth = flashActive ? 3 : 2;
      if (flashActive) { lc.shadowBlur = 16; lc.shadowColor = hitFlash.color; }
      lc.beginPath(); lc.moveTo(HIT_X, 8); lc.lineTo(HIT_X, H - 8); lc.stroke();
      lc.restore();

      // notes
      matchedTaps.forEach((m, i) => {
        const dt = m.beat - t;
        if (dt > LOOKAHEAD || dt < -0.4) return;
        const x = HIT_X + dt * pps;
        const scored = scoredTaps.has(i);
        lc.save();
        lc.shadowBlur = scored ? 0 : 12;
        lc.shadowColor = 'rgba(255,255,255,0.8)';
        lc.fillStyle = scored ? 'rgba(255,255,255,0.2)' : '#fff';
        lc.fillRect(x - 3, 12, 6, H - 24);
        lc.restore();
      });
    }

    function tick() {
      if (audio.paused) return;
      const t = audio.currentTime;

      const nextTap = matchedTaps.find((m, i) => m.beat > t && !scoredTaps.has(i));
      countdown.textContent = nextTap ? `${(nextTap.beat - t).toFixed(1)}s` : '';
      renderSequence();

      const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
      const dur = audio.duration;
      document.getElementById('duration').textContent = isNaN(dur) ? '' : `${fmt(t)} / ${fmt(dur)}`;

      const missIdx = matchedTaps.findLastIndex(m => m.beat <= t - 0.2);
      if (missIdx >= 0 && !scoredTaps.has(missIdx)) {
        scoredTaps.add(missIdx);
        inputBuffer = '';
        perfectStreak = 0;
        rating.textContent = 'MISS';
        rating.className = 'show miss';
        emit('score', { total: score, label: 'MISS' });
        hitFlash = { color: HIT_COLORS.miss, until: performance.now() + 300 };
        clearTimeout(ratingTimer);
        ratingTimer = setTimeout(() => rating.classList.remove('show'), 600);
      }

      drawLane(t);
      drawDancefloor();
      requestAnimationFrame(tick);
    }
  </script>
</body>
</html>
