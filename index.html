<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Beat Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- tap to start overlay -->
  <!-- lobby -->
  <div id="lobby">
    <div id="game-title">ANIMAL DANCE BIT</div>
    <div id="your-player">your player is <span id="my-emoji"></span></div>
    <div id="emoji-picker"></div>
    <select id="song-picker"></select>
    <div id="player-list"></div>
    <button id="ready-btn">READY</button>
    <div id="lobby-countdown"></div>
  </div>

  <div id="game">
    <!-- scoreboard (visible during game) -->
    <div id="scoreboard"></div>

    <!-- game -->
    <div id="top">
      <div id="score">score <b id="score-val">0</b></div>
      <div id="countdown"></div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="bottom">
      <div id="controls" style="display:none">
        <button id="export">export</button>
        <button id="btn">▶</button>
      </div>
    </div>
  </div>

  <audio id="audio"></audio>

  <script>
    // ── websocket ──
    const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`);
    const emit = (type, payload = {}) => ws.send(JSON.stringify({ type, ...payload }));
    let myEmoji = null;
    let isReady = false;

    let lastBoard = [];
    let playerOrder = []; // stable join order for dancefloor positions
    const shownLabels = {};
    const labelTimers = {};
    const sb = document.getElementById('scoreboard');

    // ── merged game canvas ──
    const LANE_H = 90;
    const SEQ_H = 160;
    const LOOKAHEAD = 15;
    const HIT_COLORS = { perfect: '#c084fc', great: '#22aadd', good: '#66bb44', bad: '#ff7766', miss: '#ccc' };
    const ARROWS = { U: '↑', D: '↓', L: '←', R: '→' };
    let hitFlash = null;

    const canvas = document.getElementById('game-canvas');
    const gc = canvas.getContext('2d');
    let canvasCSS = { w: 0, h: 0, dfH: 0 };

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const w = Math.min(window.innerWidth, 1024);
      const dfH = Math.round(w * 0.45);
      const h = dfH + LANE_H + SEQ_H;
      canvasCSS = { w, h, dfH, seqY: dfH + LANE_H };
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      canvas.width = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      gc.scale(dpr, dpr);
    }
    resizeCanvas();
    window.addEventListener('resize', () => { resizeCanvas(); draw(audio.currentTime); });

    const LABEL_COLORS = { perfect: '#c084fc', great: '#77ddff', good: '#aad888', bad: '#ff7766', miss: '#ff4444' };

    const emojiAnims = {}; // emoji -> { startTime, particles }
    const barPositions = {}; // emoji -> current animated x

    let animLoopRunning = false;

    function triggerPerfect(emoji) {
      const N = 12;
      emojiAnims[emoji] = {
        startTime: performance.now(),
        particles: Array.from({ length: N }, (_, i) => ({
          angle: (i / N) * Math.PI * 2 + Math.random() * 0.3,
          speed: 110 + Math.random() * 110,
          r: 6 + Math.random() * 4,
          color: ['#c084fc', '#e0b0ff', '#ffffff', '#f0c0ff'][Math.floor(Math.random() * 4)],
        })),
      };
      if (!animLoopRunning) {
        animLoopRunning = true;
        requestAnimationFrame(animLoop);
      }
    }

    function animLoop() {
      const active = Object.keys(emojiAnims);
      if (!active.length) { animLoopRunning = false; return; }
      draw(audio.currentTime);
      requestAnimationFrame(animLoop);
    }

    const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

    function drawDuration(t) {
      const W = canvasCSS.w;
      const dur = audio.duration;
      if (isNaN(dur)) return;

      // progress bar across top
      const progress = t / dur;
      gc.save();
      gc.fillStyle = 'rgba(255,255,255,0.12)';
      gc.fillRect(0, 0, W, 3);
      gc.fillStyle = 'rgba(255,255,255,0.7)';
      gc.fillRect(0, 0, W * progress, 3);
      gc.restore();

      // time text
      gc.save();
      gc.font = '12px monospace';
      gc.fillStyle = 'rgba(255,255,255,0.5)';
      gc.textAlign = 'right';
      gc.textBaseline = 'top';
      gc.fillText(`${fmt(t)} / ${fmt(dur)}`, W - 8, 8);
      gc.restore();
    }

    function draw(t) {
      gc.clearRect(0, 0, canvasCSS.w, canvasCSS.h);
      drawDancefloor();
      drawDuration(t);
      drawLane(t);
      drawSequence(t);
    }

    function drawDancefloor() {
      const W = canvasCSS.w, H = canvasCSS.dfH;
      if (!lastBoard.length) return;

      const step = W / lastBoard.length;
      const barW = step * 0.55;
      const BOT = 16;
      const EMOJI_HALF = 56; // approx half-height of 128px emoji
      const TOP_PAD = 60;    // space above emoji for label
      const maxScore = maxPossibleScore;

      // beat pulse (shared across all emojis)
      const beatT = audio.paused ? 0 : audio.currentTime;
      let pulse = 0;
      if (!audio.paused && allBeats.length) {
        const lastBeat = allBeats.filter(b => b <= beatT).at(-1);
        if (lastBeat !== undefined) {
          const elapsed = beatT - lastBeat;
          if (elapsed < 0.25) pulse = (1 - elapsed / 0.20) * 0.12;
        }
      }

      gc.textAlign = 'center';

      lastBoard.forEach((p, i) => {
        const emoji = p.emoji;
        const targetX = step * i + step / 2;
        if (barPositions[emoji] === undefined) barPositions[emoji] = targetX;
        barPositions[emoji] += (targetX - barPositions[emoji]) * 0.1;
        const x = barPositions[emoji];
        const lbl = shownLabels[emoji] || '';

        // bar
        const norm = p.score / maxScore;
        const minBarH = 10;
        const maxBarH = H - TOP_PAD - BOT;
        const barH = minBarH + norm * (maxBarH - minBarH);
        const barY = H - BOT - barH;

        gc.save();
        gc.fillStyle = p.emoji === myEmoji ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.12)';
        gc.beginPath();
        gc.roundRect(x - barW / 2, barY, barW, barH, 8);
        gc.fill();
        gc.restore();

        // score at bottom of bar
        gc.save();
        gc.font = 'bold 24px monospace';
        gc.textBaseline = 'bottom';
        gc.fillStyle = 'rgba(255,255,255,0.7)';
        gc.fillText(p.score, x, H - BOT - 4);
        gc.restore();

        // emoji sits on top of bar
        const emojiY = barY - EMOJI_HALF + 10;
        const anim = emojiAnims[emoji];

        // glow ring + particles
        if (anim) {
          const t = Math.min((performance.now() - anim.startTime) / 700, 1);
          if (t >= 1) {
            delete emojiAnims[emoji];
          } else {
            gc.save();
            const ringR = 68 + t * 88;
            gc.beginPath();
            gc.arc(x, emojiY, ringR, 0, Math.PI * 2);
            gc.strokeStyle = `rgba(192,132,252,${(1 - t) * 0.9})`;
            gc.lineWidth = 4 * (1 - t) + 1;
            gc.shadowBlur = 20;
            gc.shadowColor = '#c084fc';
            gc.stroke();
            gc.restore();

            anim.particles.forEach(part => {
              const dist = t * part.speed;
              gc.save();
              gc.globalAlpha = 1 - t;
              gc.beginPath();
              gc.arc(x + Math.cos(part.angle) * dist, emojiY + Math.sin(part.angle) * dist, part.r * (1 - t * 0.4), 0, Math.PI * 2);
              gc.fillStyle = part.color;
              gc.shadowBlur = 8;
              gc.shadowColor = part.color;
              gc.fill();
              gc.restore();
            });
          }
        }

        // emoji
        const scale = 1 + pulse;
        gc.save();
        gc.translate(x, emojiY);
        gc.scale(scale, scale);
        gc.font = '128px serif';
        gc.textBaseline = 'middle';
        gc.shadowColor = 'rgba(0,0,0,0.5)';
        gc.shadowBlur = 16;
        gc.shadowOffsetY = 6;
        gc.fillText(emoji, 0, 0);
        gc.restore();

        // label above emoji
        if (lbl) {
          const cls = lbl.split(' ')[0].toLowerCase();
          gc.save();
          gc.font = 'bold 36px monospace';
          gc.textBaseline = 'bottom';
          gc.fillStyle = LABEL_COLORS[cls] || '#fff';
          gc.shadowColor = 'rgba(0,0,0,0.6)';
          gc.shadowBlur = 6;
          gc.fillText(lbl, x, emojiY - EMOJI_HALF - 8);
          gc.restore();
        }
      });
    }

    function renderBoard() {
      sb.innerHTML = lastBoard.map(p => {
        return `
          <div class="sb-row ${p.emoji === myEmoji ? 'me' : ''}">
            <span>${p.emoji}</span>
            <span class="sb-score">${p.score}</span>
          </div>`;
      }).join('');

      draw(audio.currentTime);
    }

    ws.onmessage = ({ data }) => {
      const msg = JSON.parse(data);

      if (msg.type === 'pick_rejected') {
        const btn = pickerEl.querySelector(`[data-emoji="${msg.emoji}"]`);
        if (btn) { btn.classList.add('rejected'); setTimeout(() => btn.classList.remove('rejected'), 500); }
      }

      if (msg.type === 'assigned') {
        myEmoji = msg.emoji;
        document.getElementById('my-emoji').textContent = msg.emoji;
        renderPicker();
        loadSong(msg.song);
        if (msg.gameState === 'playing') {
          document.getElementById('ready-btn').textContent = 'waiting...';
          document.getElementById('ready-btn').disabled = true;
        }
      }

      if (msg.type === 'song') {
        loadSong(msg.song);
      }

      if (msg.type === 'players') {
        takenEmojis = msg.players.map(p => p.emoji);
        renderPicker();
        playerOrder = msg.players.map(p => p.emoji);
        const list = document.getElementById('player-list');
        list.innerHTML = msg.players.map(p => `
          <div class="player-row">
            <span>${p.emoji}</span>
            <span class="status ${p.ready ? 'ready' : ''}">${p.ready ? 'ready' : 'waiting'}</span>
          </div>
        `).join('');
      }

      if (msg.type === 'countdown') {
        countdown.textContent = msg.n;
        document.getElementById('lobby-countdown').textContent = msg.n;
      }

      if (msg.type === 'start') {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game').style.display = 'flex';
        ctx.resume();
        audio.play();
        btn.textContent = '⏸';
        tick();
      }

      if (msg.type === 'scoreboard') {
        lastBoard = msg.board;
        if (msg.label && msg.emoji) {
          shownLabels[msg.emoji] = msg.label;
          clearTimeout(labelTimers[msg.emoji]);
          labelTimers[msg.emoji] = setTimeout(() => { delete shownLabels[msg.emoji]; renderBoard(); }, 1200);
          if (msg.label.startsWith('PERFECT')) {
            triggerPerfect(msg.emoji);
          }
        }
        renderBoard();
      }
    };

    const readyBtn = document.getElementById('ready-btn');
    const pickerEl = document.getElementById('emoji-picker');
    const ALL_EMOJIS = ['🐸','🦊','🐼','🐨','🐯','🦁','🐮','🐷','🐙','🦄','🐲','🦋'];
    let takenEmojis = [];

    function renderPicker() {
      pickerEl.innerHTML = ALL_EMOJIS.map(e => {
        const isMine = e === myEmoji;
        const isTaken = takenEmojis.includes(e) && !isMine;
        return `<button class="pick-btn${isMine ? ' selected' : ''}${isTaken ? ' taken' : ''}" data-emoji="${e}" ${isTaken ? 'disabled' : ''}>${e}</button>`;
      }).join('');
    }

    // ── songs ──
    const SONGS = [
      { id: 'xiguan_manyao', name: '习惯慢摇', audio: 'xiguan_manyao.webm' },
      { id: 'trouble_maker', name: 'Trouble Maker', audio: 'trouble_maker_clipped.webm' },
      { id: 'golden', name: 'Golden', audio: 'golden.webm' },
    ];
    let currentSong = SONGS[0].id;

    function renderSongPicker() {
      const el = document.getElementById('song-picker');
      el.innerHTML = SONGS.map(s =>
        `<option value="${s.id}"${s.id === currentSong ? ' selected' : ''}>${s.name}</option>`
      ).join('');
    }

    renderSongPicker();

    document.getElementById('song-picker').addEventListener('change', e => {
      emit('pick_song', { song: e.target.value });
    });

    function setReadyBtnLoading(loading) {
      readyBtn.disabled = loading;
      if (loading) {
        readyBtn.textContent = 'LOADING...';
        readyBtn.classList.remove('is-ready');
      } else {
        readyBtn.textContent = isReady ? 'CANCEL' : 'READY';
      }
    }

    function loadSong(id) {
      const song = SONGS.find(s => s.id === id);
      if (!song) return;
      if (id === currentSong && audio.src) return; // already loaded
      currentSong = id;
      renderSongPicker();

      // reset ready state when song changes
      if (isReady) {
        isReady = false;
        emit('ready', { value: false });
      }

      setReadyBtnLoading(true);
      audio.src = `songs/${id}/${song.audio}`;
      audio.preload = 'auto';
      audio.load();

      fetch(`songs/${id}/beatmap.json`).then(r => r.json()).then(data => {
        matchedTaps = data;
        maxPossibleScore = data.reduce((sum, _, i) => sum + 100 + (i + 1) * 20, 0);
      });
      fetch(`songs/${id}/beats.json`).then(r => r.json()).then(data => {
        allBeats = data.beat_times;
      });
    }

    // ── audio / game ──
    const audio = document.getElementById('audio');
    audio.addEventListener('canplaythrough', () => setReadyBtnLoading(false));
    const btn = document.getElementById('btn');
    const countdown = document.getElementById('countdown');
    const scoreEl = document.getElementById('score-val');

    let matchedTaps = [];
    let maxPossibleScore = 1;
    let lastTapIdx = -1;
    let perfectStreak = 0;
    let streak = 0;         // good+ hits in a row (drives visual tier)
    let score = 0;
    const scoredTaps = new Set();
    const taps = [];

    const POINTS = { perfect: 100, great: 60, good: 30, bad: 10, miss: 0 };

    // ── Bar interaction state ─────────────────────────────────────────────
    const tapEchoes = [];   // { x, color, born } — fading tap marks
    const laneEmojis = [];  // { x, y, vx, vy, emoji, born } — rainbow sparkles
    let lastEmojiSpawn = 0;
    let currentBallX = 0;
    let laneH = LANE_H;     // animated lane height, lerps toward target each frame

    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    audio.volume = 0.3;

    readyBtn.addEventListener('click', () => {
      isReady = !isReady;
      emit('ready', { value: isReady });
      readyBtn.textContent = isReady ? 'CANCEL' : 'READY';
      readyBtn.classList.toggle('is-ready', isReady);
      // Unlock audio during user gesture so audio.play() works later from WS handler
      ctx.resume();
      audio.play().then(() => audio.pause()).catch(() => {});
    });

    function playTap() {
      const now = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(120, now);
      o.frequency.exponentialRampToValueAtTime(40, now + 0.3);
      g.gain.setValueAtTime(4.0, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      o.start(now); o.stop(now + 0.3);

      const bufLen = Math.floor(ctx.sampleRate * 0.04);
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
      const noise = ctx.createBufferSource();
      noise.buffer = buf;
      const ng = ctx.createGain();
      noise.connect(ng); ng.connect(ctx.destination);
      ng.gain.setValueAtTime(3, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
      noise.start(now);
    }

    function playPerfect() {
      const u = new SpeechSynthesisUtterance('Perfect!');
      u.pitch = 1.3;
      u.rate = 1.1;
      u.volume = 1;
      speechSynthesis.speak(u);
    }

    let allBeats = [];

    let inputBuffer = '';
    const KEY_MAP = { ArrowUp: 'U', ArrowDown: 'D', ArrowLeft: 'L', ArrowRight: 'R' };

    // ── orb arrow drawing (preview style) ────────────────────────────────────
    const SEQ_ORB_COLORS = {
      unmatched: { inner: '#7eb8f7', mid: '#3a6fd8', outer: '#1a2e6e', glow: 'rgba(80,140,255,0.6)',  rim: '#a8d0ff' },
      matched:   { inner: '#ffe97a', mid: '#f0a800', outer: '#7a4800', glow: 'rgba(255,190,40,0.7)',  rim: '#fff3aa' },
    };
    const SEQ_ARROW_PATH = new Path2D("M 0 -20 L 20 0 L 10 0 L 10 20 L -10 20 L -10 0 L -20 0 Z");
    const SEQ_ROTATIONS  = { U: 0, R: Math.PI / 2, D: Math.PI, L: -Math.PI / 2 };

    function drawSeqOrb(x, y, radius, state) {
      const c = SEQ_ORB_COLORS[state];
      gc.save();
      gc.translate(x, y);
      gc.shadowColor = c.glow;
      gc.shadowBlur = 6;
      const radGrad = gc.createRadialGradient(-radius * 0.25, -radius * 0.3, radius * 0.05, 0, 0, radius);
      radGrad.addColorStop(0, c.inner);
      radGrad.addColorStop(0.5, c.mid);
      radGrad.addColorStop(1, c.outer);
      gc.beginPath(); gc.arc(0, 0, radius, 0, Math.PI * 2);
      gc.fillStyle = radGrad; gc.fill();
      gc.shadowBlur = 0;
      const rimGrad = gc.createRadialGradient(-radius * 0.3, -radius * 0.35, 0, -radius * 0.1, -radius * 0.15, radius * 0.65);
      rimGrad.addColorStop(0, 'rgba(255,255,255,0.55)');
      rimGrad.addColorStop(0.5, 'rgba(255,255,255,0.08)');
      rimGrad.addColorStop(1, 'rgba(255,255,255,0)');
      gc.beginPath(); gc.arc(0, 0, radius, 0, Math.PI * 2);
      gc.fillStyle = rimGrad; gc.fill();
      gc.beginPath(); gc.arc(0, 0, radius - 1, 0, Math.PI * 2);
      gc.strokeStyle = c.rim; gc.lineWidth = 1.5; gc.globalAlpha = 0.5; gc.stroke();
      gc.restore();
    }

    function drawSeqArrow(x, y, dir, state, scale = 1) {
      const r = 34;
      drawSeqOrb(x, y, r, state);
      gc.save();
      gc.translate(x, y);
      gc.scale(scale, scale);
      gc.rotate(SEQ_ROTATIONS[dir]);

      // Faint border pass
      gc.strokeStyle = 'rgba(0,0,0,0.25)';
      gc.lineWidth = 4;
      gc.lineJoin = 'round';
      gc.stroke(SEQ_ARROW_PATH);

      if (state === 'matched') {
        const grad = gc.createLinearGradient(0, -20, 0, 20);
        grad.addColorStop(0, '#fffde0'); grad.addColorStop(1, '#ffe066');
        gc.fillStyle = grad;
        gc.shadowColor = '#ffe066'; gc.shadowBlur = 18;
      } else {
        gc.fillStyle = '#ffffff';
        gc.shadowColor = 'rgba(255,255,255,0.6)'; gc.shadowBlur = 6;
      }
      gc.strokeStyle = 'rgba(255,255,255,0.4)'; gc.lineWidth = 1.5; gc.lineJoin = 'round';
      gc.fill(SEQ_ARROW_PATH); gc.stroke(SEQ_ARROW_PATH);
      gc.restore();
    }

    function drawSequence(t) {
      const nextTap = matchedTaps.find((m, i) => m.beat > t && !scoredTaps.has(i));
      if (!nextTap || !nextTap.sequence) return;

      const W = canvasCSS.w;
      const baseY = canvasCSS.seqY;
      const seq = nextTap.sequence;

      // level label
      gc.save();
      gc.font = 'bold 28px monospace';
      gc.fillStyle = 'rgba(255,255,255,0.9)';
      gc.textAlign = 'center';
      gc.textBaseline = 'top';
      gc.fillText(`LEVEL ${seq.length}`, W / 2, baseY + 10);
      gc.restore();

      // orb arrows
      const orbR = Math.max(22, Math.min(W * 0.055, 34));
      const gap = 10;
      const totalW = seq.length * (orbR * 2 + gap) - gap;
      const startX = (W - totalW) / 2 + orbR;
      const orbY = baseY + 52 + orbR;

      seq.split('').forEach((c, i) => {
        const x = startX + i * (orbR * 2 + gap);
        const matched = i < inputBuffer.length;
        drawSeqArrow(x, orbY, c, matched ? 'matched' : 'unmatched');
      });
    }

    document.addEventListener('keydown', e => {
      const dir = KEY_MAP[e.key];
      if (dir) {
        e.preventDefault();
        if (audio.paused || !matchedTaps.length) return;
        const t = audio.currentTime;
        const nextTap = matchedTaps.find((m, i) => m.beat > t && !scoredTaps.has(i));
        if (!nextTap) return;
        if (inputBuffer === nextTap.sequence) return;
        const newBuffer = inputBuffer + dir;
        if (nextTap.sequence.startsWith(newBuffer)) {
          inputBuffer = newBuffer;
        } else {
          inputBuffer = '';
        }
        draw(t);
        return;
      }
    });

    function doTap() {
      navigator.vibrate?.(30);
      playTap();
      if (audio.paused || !matchedTaps.length) return;

      const t = audio.currentTime;
      taps.push(t);
      const closestIdx = matchedTaps.reduce((bi, m, i) => Math.abs(m.beat - t) < Math.abs(matchedTaps[bi].beat - t) ? i : bi, 0);
      const target = matchedTaps[closestIdx];

      // require full buffer match before scoring
      if (inputBuffer !== target.sequence) return;

      const signedDiff = (t - target.beat) * 1000;
      const diff = Math.abs(signedDiff);

      if (diff >= 500) return;
      if (scoredTaps.has(closestIdx)) return;
      scoredTaps.add(closestIdx);
      inputBuffer = '';

      let label, cls;
      if (diff < 80) {
        perfectStreak++;
        streak++;
        playPerfect();
        label = `PERFECT x${perfectStreak}`;
        cls = 'perfect';
        score += POINTS.perfect + (perfectStreak * 20);
      } else {
        perfectStreak = 0;
        if (diff < 100) {
          streak++;
          label = 'GREAT'; cls = 'great'; score += POINTS.great;
        } else if (diff < 180) {
          streak++;
          label = 'GOOD'; cls = 'good'; score += POINTS.good;
        } else {
          streak = 0;
          label = 'BAD'; cls = 'bad';
        }
      }
      scoreEl.textContent = score;
      emit('score', { total: score, label });

      hitFlash = { color: HIT_COLORS[cls], until: performance.now() + 400 };
      tapEchoes.push({ x: 72, color: HIT_COLORS[cls], born: performance.now() });
    }

    function doPick(emoji) {
      if (!emoji || emoji === myEmoji) return;
      myEmoji = emoji;
      document.getElementById('my-emoji').textContent = emoji;
      renderPicker();
      emit('pick_emoji', { emoji });
    }

    // picker: touchend fires even when document touchstart called preventDefault
    pickerEl.addEventListener('touchend', e => {
      const btn = e.target.closest('.pick-btn');
      if (!btn || btn.disabled) return;
      e.stopPropagation();
      e.preventDefault();
      doPick(btn.dataset.emoji);
    });
    pickerEl.addEventListener('click', e => {
      const btn = e.target.closest('.pick-btn');
      if (!btn || btn.disabled) return;
      e.stopPropagation();
      doPick(btn.dataset.emoji);
    });

    document.addEventListener('touchstart', e => { e.preventDefault(); doTap(); }, { passive: false });
    document.addEventListener('click', doTap);
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); doTap(); }
    });

    document.getElementById('export').addEventListener('click', () => {
      navigator.clipboard.writeText(JSON.stringify(taps, null, 2));
    });

    btn.addEventListener('click', () => {
      if (audio.paused) {
        ctx.resume();
        audio.play();
        btn.textContent = '⏸';
        tick();
      } else {
        audio.pause();
        btn.textContent = '▶';
      }
    });

    function drawLane(t) {
      const W = canvasCSS.w;
      // smooth lerp toward tier target height — centered expansion
      const tierH = streak >= 12 ? LANE_H + 12 : streak >= 9 ? LANE_H + 9 : streak >= 6 ? LANE_H + 6 : streak >= 3 ? LANE_H + 3 : LANE_H;
      laneH += (tierH - laneH) * 0.07;
      const H = laneH;
      const extraH = H - LANE_H;

      const HIT_X = 72;
      const pps = (W - HIT_X) / LOOKAHEAD;
      const CY = H / 2;

      gc.save();
      gc.translate(0, canvasCSS.dfH - extraH / 2); // keep lane centered

      // ── streak heat: animated gradient lane background ────────────────────
      // Tiers: 3+=blue 6+=purple 9+=gold 12+=rainbow
      const heatNow = performance.now();
      gc.save();
      gc.beginPath();
      gc.roundRect(0, 0, W, H, 12);
      gc.clip();

      if (streak >= 12) {
        // ── RAINBOW — flowing hue cycle, right side only ──
        // base: glowing white (same as hit zone colour, always readable)
        gc.fillStyle = 'rgba(255,255,255,0.12)';
        gc.fillRect(0, 0, W, H);
        // rainbow fill on top
        const SEGS = 8;
        const hueShift = (heatNow / 18) % 360;
        const rainbowGrad = gc.createLinearGradient(0, 0, W, 0);
        for (let s = 0; s <= SEGS; s++) {
          const hue = (hueShift + (s / SEGS) * 360) % 360;
          rainbowGrad.addColorStop(s / SEGS, `hsla(${hue},100%,60%,0.72)`);
        }
        gc.fillStyle = rainbowGrad;
        gc.fillRect(0, 0, W, H);
        // dark mask from left: fully opaque at hit line → transparent by ~30% of width
        const maskW = W * 0.32;
        const mask = gc.createLinearGradient(0, 0, maskW, 0);
        mask.addColorStop(0,    'rgba(0,0,0,0.82)');
        mask.addColorStop(0.55, 'rgba(0,0,0,0.30)');
        mask.addColorStop(1,    'rgba(0,0,0,0)');
        gc.fillStyle = mask;
        gc.fillRect(0, 0, maskW, H);
        // bright shimmer stripe
        const rbPhase = (heatNow / 400) % 1;
        const rbX = rbPhase * (W + 200) - 100;
        const rbSh = gc.createLinearGradient(rbX - 60, 0, rbX + 60, 0);
        rbSh.addColorStop(0,   'rgba(255,255,255,0)');
        rbSh.addColorStop(0.5, 'rgba(255,255,255,0.32)');
        rbSh.addColorStop(1,   'rgba(255,255,255,0)');
        gc.fillStyle = rbSh;
        gc.fillRect(0, 0, W, H);
        // spawn shining emoji particles
        if (heatNow - lastEmojiSpawn > 220) {
          lastEmojiSpawn = heatNow;
          const sparkEmojis = ['⭐','💫','✨','🌟','🎆','🎇','🌈','💥'];
          const em = sparkEmojis[Math.floor(Math.random() * sparkEmojis.length)];
          laneEmojis.push({
            x: HIT_X + Math.random() * (W - HIT_X),
            y: H / 2 + (Math.random() - 0.5) * (H * 0.5),
            vx: (Math.random() - 0.5) * 1.4,
            vy: -(1.2 + Math.random() * 1.6),
            emoji: em, born: heatNow,
          });
        }
      } else if (streak >= 9) {
        // ── GOLD ──
        gc.fillStyle = 'rgba(180,83,9,0.65)';
        gc.fillRect(0, 0, W, H);
        const gPhase = (heatNow / 650) % 1;
        const gX = gPhase * (W + 240) - 120;
        const gSh = gc.createLinearGradient(gX - 100, 0, gX + 100, 0);
        gSh.addColorStop(0,   'rgba(255,255,255,0)');
        gSh.addColorStop(0.5, 'rgba(253,224,71,0.52)');
        gSh.addColorStop(1,   'rgba(255,255,255,0)');
        gc.fillStyle = gSh;
        gc.fillRect(0, 0, W, H);
        const gPulse = 0.06 + Math.sin(heatNow / 200) * 0.05;
        gc.fillStyle = `rgba(251,191,36,${gPulse})`;
        gc.fillRect(0, 0, W, H);
      } else if (streak >= 6) {
        // ── PURPLE ──
        gc.fillStyle = 'rgba(126,34,206,0.45)';
        gc.fillRect(0, 0, W, H);
        const pPhase = (heatNow / 750) % 1;
        const pX = pPhase * (W + 240) - 120;
        const pSh = gc.createLinearGradient(pX - 90, 0, pX + 90, 0);
        pSh.addColorStop(0,   'rgba(255,255,255,0)');
        pSh.addColorStop(0.5, 'rgba(255,255,255,0.26)');
        pSh.addColorStop(1,   'rgba(255,255,255,0)');
        gc.fillStyle = pSh;
        gc.fillRect(0, 0, W, H);
        const pPulse = 0.05 + Math.sin(heatNow / 220) * 0.04;
        gc.fillStyle = `rgba(216,180,254,${pPulse})`;
        gc.fillRect(0, 0, W, H);
      } else if (streak >= 3) {
        // ── BLUE ──
        gc.fillStyle = 'rgba(29,78,216,0.30)';
        gc.fillRect(0, 0, W, H);
        const bPhase = (heatNow / 900) % 1;
        const bX = bPhase * (W + 240) - 120;
        const bSh = gc.createLinearGradient(bX - 110, 0, bX + 110, 0);
        bSh.addColorStop(0,   'rgba(255,255,255,0)');
        bSh.addColorStop(0.5, 'rgba(147,197,253,0.32)');
        bSh.addColorStop(1,   'rgba(255,255,255,0)');
        gc.fillStyle = bSh;
        gc.fillRect(0, 0, W, H);
      } else {
        gc.fillStyle = 'rgba(255,255,255,0.07)';
        gc.fillRect(0, 0, W, H);
      }
      gc.restore();

      // ── hit line ──────────────────────────────────────────────────────────
      const flashActive = hitFlash && performance.now() < hitFlash.until;
      gc.save();
      gc.strokeStyle = flashActive ? hitFlash.color : 'rgba(255,255,255,0.4)';
      gc.lineWidth = flashActive ? 3 : 2;
      if (flashActive) { gc.shadowBlur = 16; gc.shadowColor = hitFlash.color; }
      gc.beginPath(); gc.moveTo(HIT_X, 8); gc.lineTo(HIT_X, H - 8); gc.stroke();
      gc.restore();

      // ── notes — next 3 unscored highlighted, rest normal ──────────────────
      let lookaheadCount = 0;
      matchedTaps.forEach((m, i) => {
        const dt = m.beat - t;
        if (dt > LOOKAHEAD || dt < -0.4) return;
        const x = HIT_X + dt * pps;
        const scored = scoredTaps.has(i);
        const isNext = !scored && dt > 0 && lookaheadCount < 3;
        if (isNext) lookaheadCount++;
        gc.save();
        if (scored) {
          gc.fillStyle = 'rgba(255,255,255,0.15)';
          gc.shadowBlur = 0;
          gc.fillRect(x - 3, 12, 6, H - 24);
        } else if (isNext) {
          const rank = lookaheadCount; // 1 = next, 2, 3
          // glow multiplier scales with tier
          const tier = streak >= 12 ? 4 : streak >= 9 ? 3 : streak >= 6 ? 2 : streak >= 3 ? 1 : 0;
          const noteW = rank === 1 ? 11 : rank === 2 ? 7 : 5;
          const alpha  = rank === 1 ? 1.0 : rank === 2 ? 0.72 : 0.45;
          // glow colour tracks streak tier
          const glowR  = streak >= 12 ? `255,255,255`  :
                         streak >= 9  ? `253,224,71`   :
                         streak >= 6  ? `216,180,254`  :
                         streak >= 3  ? `147,197,253`  : `255,255,255`;
          const baseInner = rank === 1 ? 22 : rank === 2 ? 14 : 8;
          const baseOuter = rank === 1 ? 52 : rank === 2 ? 28 : 0;
          const glowMul = 1 + tier * 0.2;
          gc.fillStyle   = `rgba(${glowR},${alpha})`;
          gc.shadowBlur  = baseInner * glowMul;
          gc.shadowColor = `rgba(${glowR},0.95)`;
          gc.fillRect(x - noteW / 2, 8, noteW, H - 16);
          if (baseOuter > 0) {
            gc.shadowBlur  = baseOuter * glowMul;
            gc.shadowColor = `rgba(${glowR},0.55)`;
            gc.fillRect(x - noteW / 2, 8, noteW, H - 16);
          }
        } else {
          gc.fillStyle = 'rgba(255,255,255,0.32)';
          gc.shadowBlur = 5;
          gc.shadowColor = 'rgba(255,255,255,0.4)';
          gc.fillRect(x - 3, 12, 6, H - 24);
        }
        gc.restore();
      });

      // ── rainbow emoji particles ───────────────────────────────────────────
      const now = performance.now();
      const EMOJI_LIFE = 1400;
      for (let i = laneEmojis.length - 1; i >= 0; i--) {
        const em = laneEmojis[i];
        const age = now - em.born;
        if (age > EMOJI_LIFE) { laneEmojis.splice(i, 1); continue; }
        const prog = age / EMOJI_LIFE;
        em.x += em.vx;
        em.y += em.vy;
        em.vy += 0.04; // gentle gravity
        gc.save();
        gc.globalAlpha = Math.pow(1 - prog, 1.4);
        const sz = 14 + prog * 10;
        gc.font = `${sz}px serif`;
        gc.textAlign = 'center';
        gc.textBaseline = 'middle';
        gc.fillText(em.emoji, em.x, em.y);
        gc.restore();
      }

      // ── tap echo marks at HIT_X ───────────────────────────────────────────
      for (let i = tapEchoes.length - 1; i >= 0; i--) {
        const echo = tapEchoes[i];
        const age = now - echo.born;
        if (age > 700) { tapEchoes.splice(i, 1); continue; }
        const alpha = (1 - age / 700) * 0.9;
        const r = 6 + (age / 700) * 14;
        gc.save();
        gc.beginPath();
        gc.arc(HIT_X, CY, r, 0, Math.PI * 2);
        gc.globalAlpha = alpha;
        gc.strokeStyle = echo.color;
        gc.lineWidth = 2.5;
        gc.shadowBlur = 10;
        gc.shadowColor = echo.color;
        gc.stroke();
        gc.restore();
      }

      gc.restore();
    }

    function tick() {
      if (audio.paused) return;
      const t = audio.currentTime;

      const nextTap = matchedTaps.find((m, i) => m.beat > t && !scoredTaps.has(i));
      countdown.textContent = nextTap ? `${(nextTap.beat - t).toFixed(1)}s` : '';


      const missIdx = matchedTaps.findLastIndex(m => m.beat <= t - 0.2);
      if (missIdx >= 0 && !scoredTaps.has(missIdx)) {
        scoredTaps.add(missIdx);
        inputBuffer = '';
        perfectStreak = 0;
        streak = 0;
        emit('score', { total: score, label: 'MISS' });
        hitFlash = { color: HIT_COLORS.miss, until: performance.now() + 300 };
      }

      draw(t);
      requestAnimationFrame(tick);
    }
  </script>
</body>
</html>
