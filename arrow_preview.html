<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audition Arrow Preview</title>
  <style>
    body {
      background-color: #2b2b2b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: white;
      font-family: sans-serif;
    }
    canvas {
      border: 1px solid #555;
      background-color: #1a1a1a;
      border-radius: 8px;
    }
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #4ade80;
      border: none;
      border-radius: 4px;
      color: #111;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>Arrow Style Preview</h2>
  <canvas id="preview" width="600" height="200"></canvas>
  <div class="controls">
    <button onclick="drawArrows('unmatched')">Unmatched (Grey)</button>
    <button onclick="drawArrows('matched')">Matched (Green Pop)</button>
    <button onclick="drawArrows('missed')">Missed (Red)</button>
  </div>

  <script>
    const canvas = document.getElementById('preview');
    const ctx = canvas.getContext('2d');

    // Audition-style chunky arrow path (pointing UP by default)
    // Centered around 0,0. Fits roughly in a 40x40 box.
    const ARROW_PATH = new Path2D(
      "M 0 -20 " +
      "L 20 0 " +
      "L 10 0 " +
      "L 10 20 " +
      "L -10 20 " +
      "L -10 0 " +
      "L -20 0 Z"
    );

    const ROTATIONS = {
      'U': 0,
      'R': Math.PI / 2,
      'D': Math.PI,
      'L': -Math.PI / 2
    };

    let animationId;
    let popStartTime = 0;

    // Orb colors per state
    const ORB_COLORS = {
      unmatched: { inner: '#7eb8f7', mid: '#3a6fd8', outer: '#1a2e6e', glow: 'rgba(80, 140, 255, 0.6)', rim: '#a8d0ff' },
      matched:   { inner: '#ffe97a', mid: '#f0a800', outer: '#7a4800', glow: 'rgba(255, 190, 40, 0.7)',  rim: '#fff3aa' },
      missed:    { inner: '#ff9a9a', mid: '#e03030', outer: '#5a0000', glow: 'rgba(220, 50, 50, 0.6)',   rim: '#ffbbbb' },
    };

    function drawOrb(x, y, radius, state, scale = 1) {
      const c = ORB_COLORS[state];
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      // Outer glow
      ctx.shadowColor = c.glow;
      ctx.shadowBlur = 6;

      // Main circle gradient (dark edge → mid → bright center)
      const radGrad = ctx.createRadialGradient(-radius * 0.25, -radius * 0.3, radius * 0.05, 0, 0, radius);
      radGrad.addColorStop(0, c.inner);
      radGrad.addColorStop(0.5, c.mid);
      radGrad.addColorStop(1, c.outer);

      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.fillStyle = radGrad;
      ctx.fill();

      // Rim highlight (top-left specular)
      ctx.shadowBlur = 0;
      const rimGrad = ctx.createRadialGradient(-radius * 0.3, -radius * 0.35, 0, -radius * 0.1, -radius * 0.15, radius * 0.65);
      rimGrad.addColorStop(0, 'rgba(255,255,255,0.55)');
      rimGrad.addColorStop(0.5, 'rgba(255,255,255,0.08)');
      rimGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.fillStyle = rimGrad;
      ctx.fill();

      // Thin rim stroke
      ctx.beginPath();
      ctx.arc(0, 0, radius - 1, 0, Math.PI * 2);
      ctx.strokeStyle = c.rim;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.5;
      ctx.stroke();

      ctx.restore();
    }

    function drawArrow(x, y, dir, state, popScale = 1) {
      // Draw the orb background first
      drawOrb(x, y, 34, state, state === 'matched' ? popScale : 1);

      ctx.save();
      ctx.translate(x, y);

      // Apply pop scaling if matched
      if (state === 'matched') {
         ctx.scale(popScale, popScale);
      }

      ctx.rotate(ROTATIONS[dir]);

      // Faint border pass (drawn first, slightly wider)
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 4;
      ctx.lineJoin = 'round';
      ctx.stroke(ARROW_PATH);

      // Arrow styling based on state
      if (state === 'unmatched') {
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 1.5;
        ctx.lineJoin = 'round';
        ctx.shadowColor = 'rgba(255,255,255,0.6)';
        ctx.shadowBlur = 6;
      } else if (state === 'matched') {
        const grad = ctx.createLinearGradient(0, -20, 0, 20);
        grad.addColorStop(0, '#fffde0');
        grad.addColorStop(1, '#ffe066');
        ctx.fillStyle = grad;
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        ctx.shadowColor = '#ffe066';
        ctx.shadowBlur = 18;
      } else if (state === 'missed') {
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1.5;
        ctx.lineJoin = 'round';
        ctx.shadowColor = 'rgba(255,120,120,0.7)';
        ctx.shadowBlur = 8;
      }

      ctx.fill(ARROW_PATH);
      ctx.stroke(ARROW_PATH);
      ctx.restore();
    }

    function animatePop(state) {
      const start = performance.now();
      
      function render(now) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let scale = 1;
        if (state === 'matched') {
           const elapsed = now - start;
           // Quick pop up to 1.3x, then settle back to 1.05x over 200ms
           if (elapsed < 200) {
             const t = elapsed / 200;
             // easeOutElastic rough approximation
             scale = 1 + 0.3 * Math.sin((1 - t) * Math.PI) * (1-t);
           } else {
             scale = 1.05; // Stay slightly larger when matched
           }
        }

        const seq = ['L', 'U', 'R', 'D'];
        const startX = 150;
        const gap = 80;

        seq.forEach((dir, i) => {
          drawArrow(startX + i * gap, 100, dir, state, scale);
        });

        if (state === 'matched' && (now - start) < 300) {
          animationId = requestAnimationFrame(render);
        }
      }
      
      if (animationId) cancelAnimationFrame(animationId);
      requestAnimationFrame(render);
    }

    function drawArrows(state) {
      animatePop(state);
    }

    // Initial draw
    drawArrows('unmatched');
  </script>
</body>
</html>
